#
# Lead-source registry.
#
# Lead sources are useful for discovery, but they should not be treated as fact
# anchors. Important claims found here should be verified against original
# sources before entering the main daily radar.
#
sources:
  - name: AI HOT
    type: web_page
    url: https://aihot.virxact.com/?page=1
    tier: lead
    coverage_area: tools_products
    limit: 1
    areas:
      - lead_source
      - ai_news
      - products
      - tools
    enabled: true
    note: "Discovery source only. Verify useful items from original source links before acting."

  - name: MIT Technology Review AI
    type: rss
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed/
    tier: strong_signal
    coverage_area: industry
    limit: 8
    areas:
      - ai_news
      - industry
      - policy
      - analysis
    enabled: true
    note: "Strong signal and analysis source; not a primary source for vendor/product claims."
