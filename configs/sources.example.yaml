#
# Example source registry.
#
# Keep the registry broad before adding personal-focus sources. A current focus
# such as Browser Use / AI Agent may add extra feeds, but it should not replace
# coverage for models, research, products, infrastructure, evals, safety,
# policy, industry, open source, and global ecosystem signals.
#
sources:
  - name: OpenAI Blog
    url: https://openai.com/news/
    tier: primary
    coverage_area: models_capabilities
    areas:
      - models
      - products
      - agents

  - name: Anthropic News
    url: https://www.anthropic.com/news
    tier: primary
    coverage_area: models_capabilities
    areas:
      - models
      - products
      - safety
      - agents

  - name: Google DeepMind Blog
    url: https://deepmind.google/discover/blog/
    tier: primary
    coverage_area: research_papers
    areas:
      - research
      - models
      - multimodal

  - name: GitHub Trending
    url: https://github.com/trending
    tier: strong_signal
    coverage_area: open_source
    areas:
      - open_source
      - developer_tools

  - name: Hugging Face Papers
    url: https://huggingface.co/papers
    tier: strong_signal
    coverage_area: research_papers
    areas:
      - papers
      - models

  - name: AI HOT
    url: https://aihot.virxact.com/
    tier: lead
    enabled: false
    coverage_area: tools_products
    areas:
      - lead_source
      - ai_news
    note: "Optional comparison/backfill source only. Do not use as a default MVP source; verify any useful lead from original sources."
