<!doctype html>
<html lang="en">
  <head>
    <title>Pricing | OpenAI API</title>
    <script>window.__docs_shell = "pricing-v3";</script>
  </head>
  <body>
    <main>
      <section
        data-model-pricing
        id="gpt-5-mini"
        data-model="gpt-5-mini"
        data-input-price="$0.20 / 1M tokens"
        data-output-price="$1.60 / 1M tokens"
        data-context-window="1M tokens"
        data-capabilities="text, vision, tool calling, computer use"
        data-rate-limit="higher rate limit: 20M tokens per minute"
        data-effective-date="2026-06-01"
      >
        <h2 data-field="model">gpt-5-mini</h2>
      </section>

      <section
        data-model-pricing
        id="gpt-4o-legacy"
        data-model="gpt-4o"
        data-input-price="$2.50 / 1M tokens"
        data-output-price="$10.00 / 1M tokens"
        data-context-window="128K tokens"
        data-capabilities="text, vision, audio"
        data-rate-limit="legacy tier"
        data-deprecation="Deprecated on 2026-07-31"
        data-migration="Migrate to gpt-5-mini before 2026-07-31"
        data-effective-date="2026-06-01"
      >
        <h2 data-field="model">gpt-4o</h2>
      </section>
    </main>
  </body>
</html>
