<!doctype html>
<html lang="en">
  <head>
    <title>Pricing | OpenAI API</title>
    <script>window.__docs_shell = "pricing-v1";</script>
    <style>.marketing-card { color: #555; }</style>
  </head>
  <body>
    <nav>Docs API Pricing Changelog</nav>
    <main>
      <h1>Pricing</h1>
      <section
        data-model-pricing
        id="gpt-5-mini"
        data-model="gpt-5-mini"
        data-input-price="$0.25 / 1M tokens"
        data-output-price="$2.00 / 1M tokens"
        data-context-window="400K tokens"
        data-capabilities="text, vision, tool calling"
        data-rate-limit="standard tier"
        data-effective-date="2026-05-31"
      >
        <h2 data-field="model">gpt-5-mini</h2>
      </section>

      <section
        data-model-pricing
        id="gpt-4o-legacy"
        data-model="gpt-4o"
        data-input-price="$2.50 / 1M tokens"
        data-output-price="$10.00 / 1M tokens"
        data-context-window="128K tokens"
        data-capabilities="text, vision, audio"
        data-rate-limit="legacy tier"
        data-deprecation="Deprecated on 2026-08-31"
        data-migration="Migrate to gpt-5-mini for lower pricing and longer context"
        data-effective-date="2026-05-31"
      >
        <h2 data-field="model">gpt-4o</h2>
      </section>
    </main>
    <aside>
      <p>Recommended guides and marketing content should not affect fingerprints.</p>
    </aside>
    <footer>OpenAI footer chrome</footer>
  </body>
</html>
